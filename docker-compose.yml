services:
  postgres:
    # pgvector-enabled Postgres (Phase 2 RAG). For Supabase hosted DB, enable "vector" in SQL instead.
    image: pgvector/pgvector:pg16
    container_name: sip-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-support}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support}
      POSTGRES_DB: ${POSTGRES_DB:-support_intelligence}
    # Default host port 5433 avoids clashing with a local PostgreSQL on Windows (often :5432).
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support} -d ${POSTGRES_DB:-support_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
